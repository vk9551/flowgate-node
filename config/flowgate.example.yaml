# ──────────────────────────────────────────────────────────────────────────────
# FlowGate example configurations
#
# Three ready-to-use starting points. Copy the one closest to your use case
# to flowgate.yaml and adjust as needed.
#
# Environment variables are expanded: ${VAR} is replaced at load time.
# ──────────────────────────────────────────────────────────────────────────────


# ══════════════════════════════════════════════════════════════════════════════
# EXAMPLE 1 — Per-subject action throttling
#
# Use this when subjects (users, devices, tenants) trigger actions at varying
# urgency levels and you need to enforce per-subject rate limits with an
# active-window constraint. Critical actions always pass through. Lower-priority
# ones are capped, delayed to the subject's active hours, and batched when
# suppressed.
# ══════════════════════════════════════════════════════════════════════════════

version: "1.0"

subject:
  id_field: "user_id"          # which field in the event identifies the subject
  timezone_field: "user_tz"    # IANA tz ("America/New_York") for active-window math
  waking_hours:
    start: "07:00"
    end:   "22:00"

priorities:
  # Critical: time-sensitive, must act immediately regardless of caps or hours.
  - name: critical
    match:
      - field: "urgency"
        equals: "critical"
    bypass_all: true            # skips all caps and active-window checks

  # Standard: act during active hours, capped per day.
  - name: standard
    match:
      - field: "urgency"
        in: ["high", "normal"]

  # Bulk: low-urgency, heavy throttle, batch suppressed events into a digest.
  - name: bulk
    match:
      - field: "urgency"
        equals: "low"
    default: true               # catches anything that doesn't match above

policies:
  - priority: critical
    decision: act_now

  - priority: standard
    window:
      respect_waking_hours: true
      max_delay: 12h
    caps:
      - scope: subject
        period: 1d
        limit: 10
    decision_on_cap_breach: suppress

  - priority: bulk
    window:
      respect_waking_hours: true
      max_delay: 48h
    caps:
      - scope: subject
        period: 1d
        limit: 2
    decision_on_cap_breach: suppress

storage:
  backend: sqlite
  dsn:     /data/flowgate.db

server:
  port: 7700
  grpc_port: 7701
  auth:
    type:   jwt
    secret: "${FLOWGATE_SECRET}"
  dashboard:
    enabled: true


# ══════════════════════════════════════════════════════════════════════════════
# EXAMPLE 2 — Outbound rate shaping
#
# Use this when FlowGate governs outbound calls to downstream systems that
# have their own rate limits. Subjects are callers (clients, services, tenants).
# No active-window constraint — caps are purely time-bucket based.
# ══════════════════════════════════════════════════════════════════════════════

